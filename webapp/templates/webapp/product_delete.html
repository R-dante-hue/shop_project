{% extends 'webapp/base.html' %}
{% block title %}Удалить товар{% endblock %}
{% block content %}
<h1 class="mb-4">Удалить товар?</h1>
<div class="card mb-3"><div class="card-body"><h5>{{ product.title }}</h5><p>{{ product.price }}$</p></div></div>
<p>Вы уверены?</p>
<form method="post">{% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'product_detail' product.pk %}" class="btn btn-outline-secondary">Отмена</a>
</form>
{% endblock %}
