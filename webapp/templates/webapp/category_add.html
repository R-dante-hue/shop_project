{% extends 'webapp/base.html' %}
{% block title %}Добавить категорию{% endblock %}
{% block content %}
<h1 class="mb-4">Добавить категорию</h1>
<form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label">Название</label><input type="text" name="title" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Описание</label><textarea name="description" class="form-control" rows="3"></textarea></div>
    <button type="submit" class="btn btn-success">Добавить</button>
    <a href="{% url 'products' %}" class="btn btn-outline-secondary">Отмена</a>
</form>
{% endblock %}
