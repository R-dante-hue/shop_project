{% extends 'webapp/base.html' %}
{% block content %}
<h1 class="mb-4">Товары</h1>
<form method="get" class="mb-4">
    <div class="input-group">{{ search_form.title }}<button type="submit" class="btn btn-primary">🔍 Найти</button></div>
</form>
<div class="row">
    {% for product in products %}
    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <img src="{{ product.image_url }}" class="card-img-top" alt="{{ product.title }}" style="height: 200px; object-fit: cover;">
            <div class="card-body">
                <h5>{{ product.title }}</h5>
                <p class="text-muted">{{ product.category.title }}</p>
                <p class="fw-bold">{{ product.price }}$</p>
                <p>Остаток: {{ product.stock }}</p>
                <a href="{% url 'product_detail' product.pk %}" class="btn btn-primary">Подробнее</a>
            </div>
        </div>
    </div>
    {% empty %}<p>Товаров нет.</p>{% endfor %}
</div>
{% endblock %}
