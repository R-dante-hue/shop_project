{% extends 'webapp/base.html' %}
{% block title %}{% if product %}Редактировать{% else %}Добавить{% endif %} товар{% endblock %}
{% block content %}
<h1 class="mb-4">{% if product %}Редактировать{% else %}Добавить{% endif %} товар</h1>
<form method="post">{% csrf_token %}{{ form.as_p }}
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{% url 'products' %}" class="btn btn-outline-secondary">Отмена</a>
</form>
{% endblock %}
